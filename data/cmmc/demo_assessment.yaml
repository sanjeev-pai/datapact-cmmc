# Findings for assessments with gaps
findings:
  # Findings for Mrisan L1 completed assessment
  - assessment_title: "Mrisan L1 Self-Assessment (FY25)"
    items:
      - practice_id: PE.L1-3.10.4
        finding_type: deficiency
        severity: medium
        title: "Remote Office Physical Access Logs Incomplete"
        description: "Remote office uses paper sign-in sheet rather than electronic badge system. Logs are not archived digitally."
        status: open

      - practice_id: SC.L1-3.13.5
        finding_type: deficiency
        severity: high
        title: "Public-Facing Server Not Properly Segmented"
        description: "Public-facing application server has direct network path to CUI data stores. DMZ segmentation is insufficient."
        status: open

  # Findings for Mrisan L2 in-progress assessment
  - assessment_title: "Mrisan L2 Self-Assessment (FY26)"
    items:
      - practice_id: AC.L2-3.1.9
        finding_type: deficiency
        severity: medium
        title: "Privacy Notices Missing from Internal Systems"
        description: "Internal engineering portals (GitLab, Grafana, CI/CD dashboards) do not display privacy/security notices."
        status: open

      - practice_id: AC.L2-3.1.12
        finding_type: observation
        severity: low
        title: "VPN Monitoring Alerting Not Configured"
        description: "VPN session logs are collected in Datadog but automated alerting rules for anomalous behavior are not yet in place."
        status: open

  # Findings for Acme L1 in-progress assessment
  - assessment_title: "Acme L1 Self-Assessment (FY25)"
    items:
      - practice_id: IA.L1-3.5.2
        finding_type: deficiency
        severity: high
        title: "MFA Not Enforced for All Users"
        description: "Multi-factor authentication is only enabled for 60% of user accounts. Password complexity policy does not meet minimum requirements."
        status: open

      - practice_id: PE.L1-3.10.4
        finding_type: deficiency
        severity: medium
        title: "Physical Access Logs Missing at Satellite Office"
        description: "Satellite office does not maintain physical access logs. HQ logs are paper-based and not archived digitally."
        status: open

      - practice_id: AC.L1-3.1.20
        finding_type: observation
        severity: low
        title: "External Connection Approval Process Inconsistent"
        description: "External system connections are documented but the approval workflow is informal and not consistently followed."
        status: open

      - practice_id: PE.L1-3.10.3
        finding_type: observation
        severity: low
        title: "Visitor Escort Policy Not Enforced at Satellite Office"
        description: "Visitor escort policy exists but satellite office staff reported inconsistent enforcement."
        status: open

  # Findings for Pinnacle L2 completed assessment
  - assessment_title: "Pinnacle L2 Self-Assessment (FY25)"
    items:
      - practice_id: AC.L2-3.1.12
        finding_type: deficiency
        severity: high
        title: "Remote Access Monitoring Gaps"
        description: "VPN session monitoring lacks real-time alerting. Logs are collected but not actively monitored for anomalies."
        status: remediated

      - practice_id: AC.L2-3.1.16
        finding_type: deficiency
        severity: high
        title: "Wireless Access Controls Insufficient"
        description: "Guest WiFi segmentation from CUI network is inadequate. Network boundary between guest and production needs strengthening."
        status: open

      - practice_id: AC.L2-3.1.9
        finding_type: observation
        severity: medium
        title: "Privacy Notices Incomplete on Internal Portals"
        description: "Privacy and security notices are displayed on external-facing systems but missing from several internal web portals."
        status: remediated

      - practice_id: AC.L2-3.1.21
        finding_type: observation
        severity: medium
        title: "Portable Storage Restrictions Incomplete on Linux"
        description: "USB storage restrictions enforced on Windows via GPO but Linux workstations lack equivalent controls."
        status: open

# POA&Ms linked to assessments
poams:
  - assessment_title: "Mrisan L1 Self-Assessment (FY25)"
    org_name: "Mrisan"
    title: "Mrisan L1 Remediation Plan (FY25-26)"
    status: active
    items:
      - finding_title: "Remote Office Physical Access Logs Incomplete"
        practice_id: PE.L1-3.10.4
        milestone: "Install electronic badge reader at remote office and integrate with HQ access control system"
        scheduled_completion: "2026-04-01"
        status: in_progress
        resources_required: "Badge reader hardware ($3K), network cabling, IT ops (1 week)"
      - finding_title: "Public-Facing Server Not Properly Segmented"
        practice_id: SC.L1-3.13.5
        milestone: "Redesign DMZ architecture and migrate public app server to isolated VLAN"
        scheduled_completion: "2026-05-15"
        status: open
        resources_required: "Network engineer (2 FTEs, 3 weeks), firewall rule changes, load balancer reconfiguration"

  - assessment_title: "Mrisan L2 Self-Assessment (FY26)"
