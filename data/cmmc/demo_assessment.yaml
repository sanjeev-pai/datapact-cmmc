# Findings for assessments with gaps
findings:
  # Findings for Acme L1 in-progress assessment
  - assessment_title: "Acme L1 Self-Assessment (FY25)"
    items:
      - practice_id: IA.L1-3.5.2
        finding_type: deficiency
        severity: high
        title: "MFA Not Enforced for All Users"
        description: "Multi-factor authentication is only enabled for 60% of user accounts. Password complexity policy does not meet minimum requirements."
        status: open

      - practice_id: PE.L1-3.10.4
        finding_type: deficiency
        severity: medium
        title: "Physical Access Logs Missing at Satellite Office"
        description: "Satellite office does not maintain physical access logs. HQ logs are paper-based and not archived digitally."
        status: open

      - practice_id: AC.L1-3.1.20
        finding_type: observation
        severity: low
        title: "External Connection Approval Process Inconsistent"
        description: "External system connections are documented but the approval workflow is informal and not consistently followed."
        status: open

      - practice_id: PE.L1-3.10.3
        finding_type: observation
        severity: low
        title: "Visitor Escort Policy Not Enforced at Satellite Office"
        description: "Visitor escort policy exists but satellite office staff reported inconsistent enforcement."
        status: open

  # Findings for Pinnacle L2 completed assessment
  - assessment_title: "Pinnacle L2 Self-Assessment (FY25)"
    items:
      - practice_id: AC.L2-3.1.12
        finding_type: deficiency
        severity: high
        title: "Remote Access Monitoring Gaps"
        description: "VPN session monitoring lacks real-time alerting. Logs are collected but not actively monitored for anomalies."
        status: remediated

      - practice_id: AC.L2-3.1.16
        finding_type: deficiency
        severity: high
        title: "Wireless Access Controls Insufficient"
        description: "Guest WiFi segmentation from CUI network is inadequate. Network boundary between guest and production needs strengthening."
        status: open

      - practice_id: AC.L2-3.1.9
        finding_type: observation
        severity: medium
        title: "Privacy Notices Incomplete on Internal Portals"
        description: "Privacy and security notices are displayed on external-facing systems but missing from several internal web portals."
        status: remediated

      - practice_id: AC.L2-3.1.21
        finding_type: observation
        severity: medium
        title: "Portable Storage Restrictions Incomplete on Linux"
        description: "USB storage restrictions enforced on Windows via GPO but Linux workstations lack equivalent controls."
        status: open

# POA&Ms linked to assessments
poams:
  - assessment_title: "Acme L1 Self-Assessment (FY25)"
    org_name: "Acme Defense Corp"
    title: "Acme L1 Remediation Plan (FY25)"
    status: active
    items:
      - finding_title: "MFA Not Enforced for All Users"
        practice_id: IA.L1-3.5.2
        milestone: "Deploy MFA to remaining 40% of users via Azure AD Conditional Access"
        scheduled_completion: "2026-04-15"
        status: in_progress
        resources_required: "Azure AD P2 license expansion, IT security team (2 FTEs, 3 weeks)"
      - finding_title: "Physical Access Logs Missing at Satellite Office"
        practice_id: PE.L1-3.10.4
        milestone: "Install electronic badge reader and logging system at satellite office"
        scheduled_completion: "2026-03-01"
        status: open
        resources_required: "Badge reader hardware ($5K), installation contractor, facilities team"
      - finding_title: "External Connection Approval Process Inconsistent"
        practice_id: AC.L1-3.1.20
        milestone: "Formalize external connection approval workflow in ServiceNow"
        scheduled_completion: "2026-05-01"
        status: open
        resources_required: "ServiceNow workflow development (IT ops, 1 week)"
      - finding_title: "Visitor Escort Policy Not Enforced at Satellite Office"
        practice_id: PE.L1-3.10.3
        milestone: "Retrain satellite office staff and implement visitor check-in kiosk"
        scheduled_completion: "2026-02-15"
        status: completed
        actual_completion: "2026-02-20"
        resources_required: "Training materials, visitor kiosk hardware ($2K)"

  - assessment_title: "Pinnacle L2 Self-Assessment (FY25)"
    org_name: "Pinnacle Aero Systems"
    title: "Pinnacle L2 Remediation Plan (FY25-26)"
    status: active
    items:
      - finding_title: "Remote Access Monitoring Gaps"
        practice_id: AC.L2-3.1.12
        milestone: "Implement SIEM alerting rules for VPN anomalies"
        scheduled_completion: "2026-03-30"
        status: in_progress
        resources_required: "Splunk SIEM configuration, SOC analyst (1 FTE, 2 weeks)"
      - finding_title: "Wireless Access Controls Insufficient"
        practice_id: AC.L2-3.1.16
        milestone: "Redesign guest WiFi architecture with proper VLAN segmentation"
        scheduled_completion: "2026-06-01"
        status: open
        resources_required: "Network architect ($15K contractor), switch/AP upgrades ($20K)"
      - finding_title: "Privacy Notices Incomplete on Internal Portals"
        practice_id: AC.L2-3.1.9
        milestone: "Add standardized privacy banners to all internal web applications"
        scheduled_completion: "2026-02-28"
        status: completed
        actual_completion: "2026-02-25"
        resources_required: "Web development team (1 sprint)"
      - finding_title: "Portable Storage Restrictions Incomplete on Linux"
        practice_id: AC.L2-3.1.21
        milestone: "Deploy USBGuard on all Linux workstations"
        scheduled_completion: "2026-04-30"
        status: open
        resources_required: "Linux admin (1 FTE, 1 week), USBGuard configuration and testing"
