version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cmmc
      POSTGRES_USER: cmmc
      POSTGRES_PASSWORD: cmmc
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmmc"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
